<a class="skip-link" href="#main-content">Skip to main content</a>

<header class="header">
  <nav class="header-inner">
    <a routerLink="/dashboard" class="brand">
      <img class="brand-icon" src="github-mark.svg" alt="GitHub logo" />
      <span class="brand-text">GitHub Trending</span>
    </a>

    <a routerLink="/bookmarks" class="bookmarks-link" title="Saved repositories">
      <mat-icon class="bookmarks-icon">bookmark</mat-icon>
      @if (bookmarkCount() > 0) {
        <span class="badge" data-testid="bookmark-count">{{ bookmarkCount() }}</span>
      }
      <span class="sr-only">Saved repositories</span>
    </a>
  </nav>
</header>

<main id="main-content" tabindex="-1">
  <router-outlet />
</main>
